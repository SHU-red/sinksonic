# SinkSonic — Docker Compose
#
# Prerequisites:
#   1. PipeWire + WirePlumber running on the HOST (not in container)
#      The setup script (scripts/setup.sh) handles this.
#   2. PulseAudio TCP module loaded (script handles this too)
#
# Usage:
#   docker compose up -d

services:
  sinksonic:
    build: .
    image: ghcr.io/shu-red/sinksonic/sinksonic-webui:latest
    container_name: sinksonic
    restart: unless-stopped

    # Read-only root — protects SD card from writes.
    # Only /data (config volume) is writable.
    read_only: true
    tmpfs:
      - /tmp:size=16M

    # Host networking: the web UI needs to reach PipeWire's TCP port (4713)
    # and announce mDNS on the LAN.
    network_mode: host

    volumes:
      # Persistent config (sinksonic.yaml, hosts.json) — ONLY writable mount
      - sinksonic_data:/data

      # PipeWire socket — default: UID 1001 (sinksonic user).
      # On first boot, the setup script creates docker-compose.override.yml
      # with the actual UID from the system.
      - /run/user/1001:/run/user/1001:ro

      # systemd socket — allows reboot/poweroff via systemctl
      - /run/systemd:/run/systemd:rw

      # Machine ID — needed by some PipeWire/libpulse components
      - /etc/machine-id:/etc/machine-id:ro

    environment:
      - XDG_RUNTIME_DIR=/run/user/1001
      - CONFIG_PATH=/data/sinksonic.yaml
      - LISTEN_ADDR=0.0.0.0
      - LISTEN_PORT=80

    # Needed for reboot/poweroff via systemd and real-time PipeWire access
    cap_add:
      - SYS_BOOT
      - SYS_NICE
      - SYS_PTRACE

    security_opt:
      - seccomp=unconfined

volumes:
  sinksonic_data:
