# SinkSonic — PipeWire PulseAudio TCP listener
# Drop this into /etc/pipewire/pipewire-pulse.conf.d/ to enable
# network audio streaming from desktop clients.
#
# After installing, restart PipeWire-Pulse:
#   systemctl --user restart pipewire-pulse
# or reboot.

pulse.cmd = [
    # TCP listener — allows desktop hosts to stream audio to this device.
    {   cmd = "load-module"
        args = "module-native-protocol-tcp auth-anonymous=true"
        flags = [ nofail ]
    }
]

pulse.properties = {
    # Never idle the PulseAudio server (always listen for connections)
    pulse.idle.timeout = 0
}

stream.properties = {
    # Highest resample quality. Only matters when source and sink
    # sample rates differ (e.g. desktop at 44100 → Pi at 48000).
    # Lower values (4-7) reduce CPU on slow devices like Pi 3B.
    resample.quality = 14
}
